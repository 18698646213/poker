name: Poker
options:
  bundleIdPrefix: com.poker
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
packages:
  SwiftNIO:
    url: https://github.com/apple/swift-nio.git
    from: 2.101.3
  SwiftNIOSSL:
    url: https://github.com/apple/swift-nio-ssl.git
    from: 2.37.2
targets:
  PokerCore:
    type: framework
    platform: [macOS, iOS]
    sources:
      - Sources/PokerCore
    dependencies:
      - package: SwiftNIO
        product: NIOCore
      - package: SwiftNIO
        product: NIOFoundationCompat
      - package: SwiftNIO
        product: NIOHTTP1
      - package: SwiftNIO
        product: NIOPosix
      - package: SwiftNIOSSL
        product: NIOSSL
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.poker.core
        GENERATE_INFOPLIST_FILE: YES

  PokerDesktop:
    type: application
    platform: macOS
    sources:
      - Sources/PokerDesktop
    dependencies:
      - target: PokerCore_macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.poker.desktop
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Poker
        CODE_SIGN_STYLE: Automatic

  PokerMobile:
    type: application
    platform: iOS
    sources:
      - Apps/iOS
    dependencies:
      - target: PokerCore_iOS
      - target: PokerPacketTunnel
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.poker.mobile
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Poker
        CODE_SIGN_ENTITLEMENTS: Apps/iOS/PokerMobile.entitlements
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"

  PokerPacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - Extensions/PacketTunnel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.poker.mobile.PacketTunnel
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: Extensions/PacketTunnel/PokerPacketTunnel.entitlements
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
        INFOPLIST_KEY_NSExtension_NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).PacketTunnelProvider"
